name: dbt CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dbt Snowflake
        run: pip install dbt-snowflake==1.11.5

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          my_project:
            target: dev
            outputs:
              dev:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                password: ${{ secrets.SNOWFLAKE_PASSWORD }}
                role: ${{ secrets.SNOWFLAKE_ROLE }}
                database: ${{ secrets.SNOWFLAKE_DATABASE }}
                warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
                schema: dbt_ci_${{ github.event.pull_request.number }}
                threads: 4
          EOF

      - name: dbt debug
        run: dbt debug
        working-directory: my_project

      - name: dbt compile
        run: dbt compile
        working-directory: my_project

      - name: dbt run
        run: dbt run
        working-directory: my_project

      - name: dbt test
        run: dbt test --no-partial-parse
        working-directory: my_project

      - name: dbt snapshot
        run: dbt snapshot
        working-directory: my_project

      - name: Clean up CI schema
        if: always()
        run: |
          dbt run-operation drop_schema \
          --args '{"schema": "dbt_ci_${{ github.event.pull_request.number }}"}'
        working-directory: my_project